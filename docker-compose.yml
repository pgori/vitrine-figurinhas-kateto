services:
  db:
    image: postgres:16-alpine
    container_name: vitrine-figurinhas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vitrine_figurinhas}
      POSTGRES_USER: ${POSTGRES_USER:-vitrine_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vitrine_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: vitrine-figurinhas-backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-vitrine_user}:${POSTGRES_PASSWORD:-vitrine_password}@db:5432/${POSTGRES_DB:-vitrine_figurinhas}}
      ENVIRONMENT: development
      BACKEND_AUTH_USERNAME: ${BACKEND_AUTH_USERNAME:-admin}
      BACKEND_AUTH_PASSWORD: ${BACKEND_AUTH_PASSWORD:-admin}
      BACKEND_TOKEN_SECRET: ${BACKEND_TOKEN_SECRET:-dev-secret-change-me}
      BACKEND_TOKEN_TTL_SECONDS: ${BACKEND_TOKEN_TTL_SECONDS:-28800}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5173}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: vitrine-figurinhas-frontend
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
